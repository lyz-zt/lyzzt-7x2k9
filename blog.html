<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lyz & zt</title>
  <style>
    :root {
      --bg: #121921;
      --card-bg: rgba(20, 28, 40, 0.85);
      --text: #d0d6e0;
      --accent: #ff7b9c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      min-height: 100vh;
      color: var(--text);
    }

    /* 星空背景 */
    #starfield {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--twinkle-dur, 3s) ease-in-out infinite;
      animation-delay: var(--twinkle-delay, 0s);
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.9; transform: scale(1.6); }
    }

    /* 导航栏 */
    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(18, 25, 33, 0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .nav-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #e8edf3;
    }

    .nav-title .heart {
      color: var(--accent);
      margin: 0 4px;
    }

    .btn-logout {
      padding: 8px 20px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 8px;
      color: #8899aa;
      font-size: 13px;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.3s;
    }

    .btn-logout:hover {
      background: rgba(255, 107, 122, 0.15);
      border-color: rgba(255, 107, 122, 0.35);
      color: #ff6b7a;
    }

    /* 主容器 */
    .main {
      position: relative;
      z-index: 1;
      max-width: 720px;
      margin: 0 auto;
      padding: 100px 24px 60px;
    }

    /* 头像区域 */
    .hero {
      text-align: center;
      margin-bottom: 48px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff7b9c, #c8a8e8);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-bottom: 16px;
      box-shadow: 0 0 30px rgba(255, 123, 156, 0.2);
    }

    .hero h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #e8edf3;
    }

    .hero p {
      color: #667788;
      font-size: 14px;
      margin-top: 6px;
      letter-spacing: 1px;
    }

    /* 文章卡片 */
    .post-card {
      background: var(--card-bg);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      padding: 28px;
      margin-bottom: 20px;
      transition: all 0.3s;
      cursor: pointer;
    }

    .post-card:hover {
      border-color: rgba(255, 123, 156, 0.25);
      box-shadow: 0 4px 30px rgba(255, 123, 156, 0.08);
      transform: translateY(-2px);
    }

    .post-date {
      font-size: 12px;
      color: #556677;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .post-title {
      font-size: 20px;
      font-weight: 600;
      color: #e0e6ed;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .post-excerpt {
      font-size: 14px;
      color: #8899aa;
      line-height: 1.7;
    }

    .post-tags {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tag {
      padding: 3px 10px;
      font-size: 11px;
      border-radius: 12px;
      background: rgba(255, 123, 156, 0.1);
      color: #ff7b9c;
      letter-spacing: 1px;
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px 0;
      color: #556677;
      font-size: 15px;
      letter-spacing: 2px;
    }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 40px 0;
      color: rgba(255, 255, 255, 0.15);
      font-size: 13px;
      letter-spacing: 3px;
    }

    @media (max-width: 600px) {
      .navbar { padding: 12px 18px; }
      .nav-title { font-size: 18px; }
      .main { padding: 90px 16px 40px; }
      .post-card { padding: 20px; }
    }
  </style>
</head>
<body>

  <!-- 星空 -->
  <div id="starfield"></div>

  <!-- 导航 -->
  <nav class="navbar">
    <span class="nav-title">lyz <span class="heart">♥</span> zt</span>
    <button class="btn-logout" id="btn-logout">退出</button>
  </nav>

  <!-- 主容器 -->
  <div class="main">
    <div class="hero">
      <div class="avatar">💡</div>
      <h1>我们的角落</h1>
      <p>记录那些发光的瞬间</p>
    </div>

    <div id="post-list">
      <div class="empty-state">还没有文章，故事正在书写中 ✨</div>
    </div>

    <div class="footer">lyz ♥ zt</div>
  </div>

  <script>
    (function () {
      // 登录检查
      var token = localStorage.getItem("blog_token");
      if (!token) {
        window.location.href = "/index.html";
        return;
      }

      // 解析 token 检查是否过期
      try {
        var payload = JSON.parse(atob(token));
        if (payload.exp && Date.now() > payload.exp) {
          localStorage.removeItem("blog_token");
          window.location.href = "/index.html";
          return;
        }
      } catch (e) {
        localStorage.removeItem("blog_token");
        window.location.href = "/index.html";
        return;
      }

      // 退出登录
      document.getElementById("btn-logout").addEventListener("click", function () {
        localStorage.removeItem("blog_token");
        window.location.href = "/index.html";
      });

      // 生成星空
      function createStars() {
        var container = document.getElementById("starfield");
        var frag = document.createDocumentFragment();
        for (var i = 0; i < 80; i++) {
          var star = document.createElement("div");
          star.className = "star";
          var size = Math.random() * 2.5 + 0.8;
          star.style.left = Math.random() * 100 + "%";
          star.style.top = Math.random() * 100 + "%";
          star.style.width = size + "px";
          star.style.height = size + "px";
          star.style.setProperty("--twinkle-dur", (Math.random() * 3 + 2) + "s");
          star.style.setProperty("--twinkle-delay", (Math.random() * 4) + "s");
          frag.appendChild(star);
        }
        container.appendChild(frag);
      }

      createStars();
    })();
  </script>
</body>
</html>
